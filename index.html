<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Astra — Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="projects-app">
    <div class="projects-header">
      <div class="projects-logo">
        <div class="projects-logo-icon">
          <svg viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="6.5,1 12,4.5 12,9.5 6.5,12 1,9.5 1,4.5" fill="none" stroke="white" stroke-width="1.2"/>
            <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="white" stroke-width="0.8" opacity="0.5"/>
            <line x1="1" y1="4.5" x2="12" y2="9.5" stroke="white" stroke-width="0.8" opacity="0.5"/>
            <line x1="12" y1="4.5" x2="1" y2="9.5" stroke="white" stroke-width="0.8" opacity="0.5"/>
          </svg>
        </div>
        Ad Astra
      </div>
      <div class="projects-tagline">Every project keeps its own graph, notes, and progress — pick one to continue, or start something new.</div>
    </div>

    <div class="projects-toolbar">
      <input type="text" id="projects-search" class="projects-search" placeholder="Filter projects…" />
      <button class="tb-btn projects-import-btn" id="btn-import-project">⬆ Import project</button>
      <input type="file" id="import-file-input" accept="application/json" style="display:none" />
    </div>

    <div class="projects-grid" id="projects-grid"></div>
  </div>

  <div id="modal-host"></div>
  <div id="toast-host"></div>

  <script type="module" src="projects.js"></script>
</body>
</html>
